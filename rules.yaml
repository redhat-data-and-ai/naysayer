# Rule-Based Validation Configuration for dataproduct-config repository

enabled: true

files:
  # Product configuration files - Critical infrastructure validation
  - name: "product_configs"
    path: "dataproducts/**/"
    filename: "product.{yaml,yml}"
    parser_type: yaml
    enabled: true
    sections:
      # Critical sections - always require manual review
      - name: warehouses
        yaml_path: warehouses
        rule_configs:
          - name: warehouse_rule
            enabled: true
        auto_approve: false

      # Full file validation for new products in preprod/prod
      - name: full_file_toc_validation
        yaml_path: .
        rule_configs:
          - name: toc_approval_rule
            enabled: true
        auto_approve: false

      # Consumer access changes - auto-approve with data product owner approval
      - name: data_product_db_validation
        yaml_path: data_product_db
        rule_configs:
          - name: dataproduct_consumer_rule
            enabled: true
        auto_approve: true

      - name: service_account
        yaml_path: service_account
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: false

      - name: name
        yaml_path: name
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true

      - name: rover_group
        yaml_path: rover_group
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true

      - name: tags
        yaml_path: tags
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true

      - name: kind
        yaml_path: kind
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true

  # Documentation files - Auto-approve
  - name: "documentation_files"
    path: "**/"
    filename: "*.md"
    parser_type: yaml
    enabled: true
    sections:
      - name: full_file_doc_validation
        yaml_path: .
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true

  # Source binding configuration files - Low risk, can auto-approve
  - name: "source_bindings"
    path: "dataproducts/**/"
    filename: "sourcebinding.yaml"
    parser_type: yaml
    enabled: true
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true

  # Snowpipe configuration files - Low risk, can auto-approve
  - name: "snowpipe_configs"
    path: "dataproducts/**/"
    filename: "snowpipeconfig.yaml"
    parser_type: yaml
    enabled: true
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true

  # Developer metadata files - Low risk, can auto-approve
  - name: "developer_metadata"
    path: "dataproducts/**/"
    filename: "developers.yaml"
    parser_type: yaml
    enabled: true
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true

  # Group configuration files - Low risk, can auto-approve
  - name: "group_configs"
    path: "dataproducts/**/groups/"
    filename: "*.{yaml,yml}"
    parser_type: yaml
    enabled: true
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true

  # Masking files - Validated with masking_policy_rule
  - name: "masking_files"
    path: "dataproducts/**/"
    filename: "*masking.{yaml,yml}"
    parser_type: yaml
    enabled: false
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: masking_policy_rule
            enabled: true
        auto_approve: true

  # Tag CR files - Validates tag configurations
  - name: "tag_files"
    path: "dataproducts/**/"
    filename: "*tag*.{yaml,yml}"
    parser_type: yaml
    enabled: false
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: tag_rule
            enabled: true
        auto_approve: true

  # CODEOWNERS file - Auto-approve when synced with developers.yaml or groups/*.yaml
  - name: "codeowners_file"
    path: "**/"
    filename: "CODEOWNERS"
    parser_type: yaml
    enabled: true
    sections:
      - name: codeowners_sync_validation
        yaml_path: .
        rule_configs:
          - name: codeowners_sync_rule
            enabled: true
        auto_approve: true

  # ============================================================================
  # SANDBOX UNSTRUCTURED DATA PRODUCT RULES (AIF-*)
  # ============================================================================
  # These rules apply ONLY when sandbox/unstructured-data-product.yaml exists with:
  #   kind: UnstructuredDataProduct
  #   name: aif-*
  #
  # When active, they OVERRIDE the default behavior for specific files:
  # 1. unstructured-data-pipeline.yaml → Validate file path and s3 prefixes match product name
  # 2. developers.yaml → Must have exactly 2 owners (1 human + 1 service account), match CODEOWNERS
  # 3. groups/*.yaml → Always manual review
  # ============================================================================

  # Rule 1: Unstructured Data Product Config - Auto-approve config changes
  - name: "sandbox_unstructured_product_config"
    path: "dataproducts/unstructured/aif-*/sandbox/"
    filename: "unstructured-data-product.yaml"
    parser_type: yaml
    enabled: true
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: metadata_rule
            enabled: true
        auto_approve: true  # Auto-approve product config changes

  # Rule 2: Unstructured Data Pipeline - Validate path and prefix matching
  - name: "sandbox_unstructured_pipeline"
    path: "dataproducts/unstructured/aif-*/sandbox/"
    filename: "unstructured-data-pipeline.yaml"
    parser_type: yaml
    enabled: true
    prerequisite_check:
      # Only apply if sandbox/unstructured-data-product.yaml has kind=UnstructuredDataProduct
      file_path: "sandbox/unstructured-data-product.yaml"
      yaml_conditions:
        - path: "kind"
          value: "UnstructuredDataProduct"
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: sandbox_unstructured_pipeline_rule
            enabled: true
        auto_approve: true  # Conditional - validates path and prefix match

  # Rule 3: Developers.yaml (Product Root Level) - Must have exactly 2 owners matching CODEOWNERS
  - name: "sandbox_unstructured_developers"
    path: "dataproducts/unstructured/aif-*/"
    filename: "developers.yaml"
    parser_type: yaml
    enabled: true
    prerequisite_check:
      # Only apply if sandbox/unstructured-data-product.yaml has kind=UnstructuredDataProduct
      file_path: "sandbox/unstructured-data-product.yaml"
      yaml_conditions:
        - path: "kind"
          value: "UnstructuredDataProduct"
    exclusions:
      # Exclude developers.yaml inside sandbox/dev/preprod/prod folders
      - "**/sandbox/**"
      - "**/dev/**"
      - "**/preprod/**"
      - "**/prod/**"
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: sandbox_developers_rule
            enabled: true
        auto_approve: false  # Conditional - only if count=2, unchanged, and matches CODEOWNERS

  # Rule 4: Groups folder - Always manual review for sandbox unstructured products
  - name: "sandbox_unstructured_groups"
    path: "dataproducts/unstructured/aif-*/groups/"
    filename: "*.{yaml,yml}"
    parser_type: yaml
    enabled: true
    prerequisite_check:
      # Only apply if sandbox/unstructured-data-product.yaml has kind=UnstructuredDataProduct
      file_path: "../sandbox/unstructured-data-product.yaml"
      yaml_conditions:
        - path: "kind"
          value: "UnstructuredDataProduct"
    sections:
      - name: full_file
        yaml_path: .
        rule_configs:
          - name: sandbox_groups_strict_rule
            enabled: true
        auto_approve: false  # Always manual review

# STRICT POLICY ENFORCEMENT:
# Any file type not explicitly configured above will require manual review by default.
# This includes:
#   - .sql files (migration scripts) - CRITICAL: Always require manual review
#   - .gitlab-ci.yml (CI configuration) - Security-critical
#   - .yaml/.yml files not matching patterns above - Require review
#   - Any other file types - Default to manual review
#
# This implements the strict policy: "do not approve if MR has changes not covered in rules"
