sourceConfig:
  type: "s3"
  s3Config:
    bucket: "dataverse-sandbox-unstructured"
    prefix: "withpipeline/source-data"
documentProcessorConfig:
  type: "docling"
  doclingConfig:
    from_formats:
      - pdf
      - docx
      - md
    to_formats:
      - md
    do_ocr: true
chunksGeneratorConfig:
  strategy: "recursiveCharacterTextSplitter"
  recursiveCharacterSplitterConfig:
    chunkSize: 1000
    chunkOverlap: 5
vectorEmbeddingsGeneratorConfig:
  modelName: nomic-ai/nomic-embed-text-v1.5
destinationConfig:
  type: "s3"
  s3DestinationConfig:
    bucket: dataverse-sandbox-unstructured
    prefix: withpipeline/processed-data
